<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Flower Story</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

  background: url("https://media.easy-peasy.ai/27feb2bb-aeb4-4a83-9fb6-8f3f2a15885e/aaca6b91-d036-45c9-8992-aead66512b18.png")
  no-repeat center center fixed;

  background-size: cover;

  transition: filter 1.2s ease;
}

/* dark overlay */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: rgba(0, 0, 0, 0.75);
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
}

#card {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
  font-size: 28px;
  padding: 30px;

  color: #ffffff;

  z-index: 5;

  text-shadow:
    0 2px 10px rgba(0,0,0,0.7),
    0 0 20px rgba(0,0,0,0.4);

  transition: opacity 0.3s ease;
}

.hint {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 20px);
  right: 20px;
  font-size: 14px;
  opacity: 0.7;
  z-index: 6;
}
</style>
</head>
<audio id="ambience" loop>
  <source src="mixkit-birds-chirping-near-the-river-2473.mp3" type="audio/mpeg">
</audio>

<script>
const ambience = document.getElementById("ambience");
ambience.volume = 0.15;

// Start music on first tap
document.addEventListener("click", () => {
  ambience.play();
}, { once: true });
</script><body>

<canvas id="c"></canvas>
<div class="overlay" id="overlay"></div>

<div id="card">I spent hours</div>
<div class="hint">Swipe →</div>

<script>

/* ---------------- STORY ---------------- */
const slides = [
  "I spent hours...",
  "Making a website to give you flowers!",
  "I Almost Thought It Wasn't Worth It...",
  "Until I remembered your smile :)"
];

let stage = 0;
let startX = 0;

/* ---------------- LIGHTING (simple safe version) ---------------- */
function applyLighting(i) {
  const overlay = document.getElementById("overlay");

  const levels = [
    "rgba(0,0,0,0.75)",
    "rgba(0,0,0,0.55)",
    "rgba(0,0,0,0.40)",
    "rgba(0,0,0,0.30)"
  ];

  overlay.style.background = levels[i] || "rgba(0,0,0,0.3)";
}

applyLighting(0);

/* ---------------- CANVAS ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ---------------- IMAGES ---------------- */
function load(srcs) {
  return srcs.map(s => {
    const img = new Image();
    img.src = s;
    return img;
  });
}

const flowerImgs = load([
  "https://upload.wikimedia.org/wikipedia/commons/f/fc/Blue_Flower_Transparent_Background.png",
  "https://www.onlygfx.com/wp-content/uploads/2016/05/red-rose-1.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/284/small/ai-generated-bright-white-flower-with-elegant-petals-on-transparent-background-stock-png.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/348/small/ai-generated-vibrant-yellow-cosmos-flower-with-delicate-petals-on-transparent-background-stock-png.png"
]);

const leafImgs = [
  "https://png.pngtree.com/png-clipart/20240420/original/pngtree-green-leaf-for-element-png-image_14904901.png",
  "https://gallery.yopriceville.com/var/albums/Free-Clipart-Pictures/Decorative-Elements-PNG/Leaf_PNG_Clipart.png"
].map(src => {
  const img = new Image();
  img.src = src;
  return img;
});

/* ---------------- FLOWERS ---------------- */
const flowers = [];

function growFlower(x, y, forceExplosion = false) {
  const explosion = forceExplosion || Math.random() < 0.7;

  flowers.push({
    x,
    y: explosion ? Math.random() * canvas.height : canvas.height - 10,
    size: 0,
    maxSize: 25 + Math.random() * 45,
    img: flowerImgs[Math.floor(Math.random() * flowerImgs.length)],
    sway: Math.random() * 0.8,
    driftY: explosion ? Math.random() * canvas.height : canvas.height - 10
  });
}

/* ---------------- LEAVES ---------------- */
const leaves = [];

function spawnLeaf() {
  leaves.push({
    x: -50,
    y: Math.random() * canvas.height,
    vx: 2 + Math.random() * 2,
    vy: (Math.random() - 0.5),
    size: 15 + Math.random() * 20,
    rot: Math.random() * Math.PI,
    img: leafImgs[Math.floor(Math.random() * leafImgs.length)]
  });
}

/* spawn leaves during story */
setInterval(() => {
  if (stage < slides.length - 1) {
    spawnLeaf();
  }
}, 250);

/* ---------------- FLOWER + TEXT CONTROL ---------------- */
document.addEventListener("click", () => {

  next();

  const intensity = stage < slides.length - 1 ? 4 : 18;

  for (let i = 0; i < intensity; i++) {
    growFlower(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      true
    );
  }
});

/* ---------------- STORY FLOW ---------------- */
function next() {
  const card = document.getElementById("card");
  stage++;

  if (stage < slides.length) {

    applyLighting(stage);

    card.style.opacity = 0;

    setTimeout(() => {
      card.innerText = slides[stage];
      card.style.opacity = 1;
    }, 200);

  } else {
    card.style.display = "none";
    document.querySelector(".hint").style.display = "none";
  }
}

/* ---------------- ANIMATION ---------------- */
function animate() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* leaves */
  for (let i = 0; i < leaves.length; i++) {
    const l = leaves[i];

    l.x += l.vx;
    l.y += l.vy;
    l.rot += 0.01;

    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.rot);
    ctx.drawImage(l.img, -l.size/2, -l.size/2, l.size, l.size);
    ctx.restore();

    if (l.x > canvas.width + 100) {
      leaves.splice(i, 1);
    }
  }

  /* flowers */
  for (let f of flowers) {

    if (f.size < f.maxSize) {
      f.size += 0.7;
    }

    const sway = Math.sin(Date.now() * 0.002 + f.x) * f.sway;

    ctx.drawImage(
      f.img,
      f.x + sway - f.size / 2,
      f.y - f.size,
      f.size,
      f.size
    );
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
