<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Growing Flower Story</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;

  /* FIXED READABLE FONT (iOS SAFE) */
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

  background: url("https://media.easy-peasy.ai/27feb2bb-aeb4-4a83-9fb6-8f3f2a15885e/aaca6b91-d036-45c9-8992-aead66512b18.png")
  no-repeat center center fixed;

  background-size: cover;
}

/* soft bright overlay so text is readable */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.10);
  z-index: 1;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
}

/* TEXT LAYER */
#card {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
  font-size: 26px;
  padding: 30px;
  color: #1a1a1a;

  z-index: 5;

  text-shadow: 0 1px 5px rgba(255,255,255,0.6);
  transition: opacity 0.25s ease;
}

.hint {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 20px);
  right: 20px;
  font-size: 14px;
  opacity: 0.7;
  z-index: 6;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="overlay"></div>

<div id="card">Tap to grow flowers 🌱</div>
<div class="hint">Tap anywhere →</div>

<script>

/* ---------------- CANVAS ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

ctx.imageSmoothingEnabled = true;

/* ---------------- FLOWER IMAGES ---------------- */
function load(srcs) {
  return srcs.map(s => {
    const img = new Image();
    img.src = s;
    return img;
  });
}

const flowerImgs = load([
  "https://upload.wikimedia.org/wikipedia/commons/f/fc/Blue_Flower_Transparent_Background.png",
  "https://www.onlygfx.com/wp-content/uploads/2016/05/red-rose-1.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/284/small/ai-generated-bright-white-flower-with-elegant-petals-on-transparent-background-stock-png.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/348/small/ai-generated-vibrant-yellow-cosmos-flower-with-delicate-petals-on-transparent-background-stock-png.png"
]);

/* ---------------- FLOWERS ---------------- */
const flowers = [];

/* each flower grows upward from ground */
function growFlower(x) {
  flowers.push({
    x: x,
    groundY: canvas.height - 20,
    y: canvas.height - 20,
    height: 0,
    maxHeight: 80 + Math.random() * 120,
    size: 40 + Math.random() * 30,
    img: flowerImgs[Math.floor(Math.random() * flowerImgs.length)],
    sway: Math.random() * 0.5
  });
}

/* ---------------- TAP = GROW ---------------- */
document.addEventListener("click", () => {
  for (let i = 0; i < 3; i++) {
    growFlower(Math.random() * canvas.width);
  }
});

/* ---------------- INITIAL FLOWERS ---------------- */
for (let i = 0; i < 5; i++) {
  growFlower(Math.random() * canvas.width);
}

/* ---------------- RENDER LOOP ---------------- */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let f of flowers) {

    // grow upward
    if (f.height < f.maxHeight) {
      f.height += 1.2;
    }

    const y = f.groundY - f.height;

    const swayOffset = Math.sin(Date.now() * 0.002 + f.x) * 5;

    ctx.drawImage(
      f.img,
      f.x + swayOffset - f.size/2,
      y - f.size,
      f.size,
      f.size
    );
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
