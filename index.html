<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Flower Story</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

  background: url("https://media.easy-peasy.ai/27feb2bb-aeb4-4a83-9fb6-8f3f2a15885e/aaca6b91-d036-45c9-8992-aead66512b18.png")
  no-repeat center center fixed;

  background-size: cover;

  transition: filter 1.2s ease;
}

/* dynamic light overlay (THIS is what changes mood) */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;

  /* darkens background without touching flowers/text */
  background: rgba(0, 0, 0, 0.25);
}
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
}

#card {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
  font-size: 28px;
  padding: 30px;

  color: #ffffff;

  z-index: 5;

  /* THIS is what makes it readable */
  text-shadow:
    0 2px 10px rgba(0,0,0,0.7),
    0 0 20px rgba(0,0,0,0.4);

  transition: opacity 0.3s ease;
}

.hint {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 20px);
  right: 20px;
  font-size: 14px;
  opacity: 0.7;
  z-index: 6;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="overlay" id="overlay"></div>

<div id="card">I spent hours on this</div>
<div class="hint">Swipe →</div>

<script>
document.addEventListener("click", () => {

  const intensity = stage < slides.length - 1 ? 5 : 18;

  for (let i = 0; i < intensity; i++) {
    growFlower(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      true
    );
  }
});
/* ---------------- STORY ---------------- */
const slides = [
  "I spent hours",
  "Making a website to give you flowers",
  "I Almost Thought It Wasn't Worth It...",
  "Until I remembered your smile :)"
];

let stage = 0;
let startX = 0;

/* ---------------- LIGHTING SYSTEM ---------------- */
const lighting = [
  {
    filter: "brightness(1.05) saturate(1.05)",
    overlay: "rgba(255, 220, 180, 0.08)" // morning glow
  },
  {
    filter: "brightness(1.15) saturate(1.1)",
    overlay: "rgba(255, 255, 255, 0.05)" // clean daylight
  },
  {
    filter: "brightness(1.05) saturate(1.2)",
    overlay: "rgba(255, 180, 120, 0.10)" // warm sunset
  },
  {
    filter: "brightness(0.95) saturate(1.15)",
    overlay: "rgba(120, 140, 200, 0.12)" // dusk / emotional tone
  }
];

function applyLighting(i) {
  document.body.style.filter = lighting[i].filter;
  document.getElementById("overlay").style.background = lighting[i].overlay;
}

/* start lighting */
applyLighting(0);

/* ---------------- SWIPE ---------------- */
document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, {passive:true});

document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (dx < -40) next();
});

document.addEventListener("click", next);

function next() {
  const card = document.getElementById("card");
  stage++;

  if (stage < slides.length) {

    applyLighting(stage); // 🌤️ CHANGE LIGHT WITH STORY

    card.style.opacity = 0;

    setTimeout(() => {
      card.innerText = slides[stage];
      card.style.opacity = 1;
    }, 200);

    return;
  }

  document.getElementById("card").style.display = "none";
  document.querySelector(".hint").style.display = "none";
}

/* ---------------- CANVAS ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

ctx.imageSmoothingEnabled = true;

/* ---------------- FLOWERS ---------------- */
function load(srcs) {
  return srcs.map(s => {
    const img = new Image();
    img.src = s;
    return img;
  });
}

const flowerImgs = load([
  "https://upload.wikimedia.org/wikipedia/commons/f/fc/Blue_Flower_Transparent_Background.png",
  "https://www.onlygfx.com/wp-content/uploads/2016/05/red-rose-1.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/284/small/ai-generated-bright-white-flower-with-elegant-petals-on-transparent-background-stock-png.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/348/small/ai-generated-vibrant-yellow-cosmos-flower-with-delicate-petals-on-transparent-background-stock-png.png"
]);

const flowers = [];

/* budding flowers */
function growFlower(x, y = null, forceExplosion = false) {

  const isExplosion = forceExplosion || Math.random() < 0.7;

  flowers.push({
    x: x,
    y: y ?? (isExplosion ? Math.random() * canvas.height : canvas.height - 10),

    size: 0,
    maxSize: 25 + Math.random() * 45,

    img: flowerImgs[Math.floor(Math.random() * flowerImgs.length)],

    sway: Math.random() * 0.8,

    driftY: isExplosion
      ? Math.random() * canvas.height
      : canvas.height - 10
  });
}
/* ---------------- ANIMATE ---------------- */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let f of flowers) {

    if (f.size < f.maxSize) {
      f.size += 0.7;
    }

    const sway = Math.sin(Date.now() * 0.002 + f.x) * f.sway;

    ctx.drawImage(
      f.img,
      f.x + sway - f.size / 2,
      f.y - f.size,
      f.size,
      f.size
    );
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
